{% extends "base.html" %}

{% block content %}

<div class="form-container">

    <h1>Create Task</h1>

    <form method="post">

        {% csrf_token %}

        <div class="form-group">
            <label>Title:</label>
            {{ form.title }}
        </div>


        <div class="form-group">
            <label>Description:</label>
            {{ form.description }}
        </div>


        <div class="checkbox-box">
            <label>
                Completed
                {{ form.completed }}

            </label>

        </div>


        <button type="submit" class="save-btn">
            Save
        </button>

    </form>

</div>

{% endblock %}
