{% extends "base.html" %}

{% block content %}

    <div class="form-container">

        <h1>Create Account</h1>

        <form method="post">

            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="save-btn">
                Register
            </button>

        </form>

        <p class="form-link">
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>

    </div>

{% endblock %}
